<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目报表</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .report-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .report-title {
            font-size: 28px;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 10px;
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .report-table th {
            background-color: #0d6efd;
            color: white;
            padding: 12px;
            text-align: left;
        }
        .report-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        .report-table tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .report-table tr:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="report-header">
            <div class="report-title" id="projectTitle"></div>
            <div class="text-muted">项目详细报表</div>
        </div>
        
        <table class="report-table table-striped">
            <thead>
                <tr>
                    <th>相关项目</th>
                    <th>内容说明</th>
                </tr>
            </thead>
            <tbody id="reportContent">
                <!-- 报表内容将通过JS动态加载 -->
            </tbody>
        </table>
    </div>

    <script src="js/axios.min.js"></script>
    <script>
        // 从URL获取项目ID
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        // 加载项目数据
        function loadProjectData() {
            if (!projectId) {
                document.getElementById('projectTitle').textContent = '无效的项目ID';
                return;
            }

            axios.get(`/api/open-source-projects/${projectId}`)
                .then(response => {
                    const project = response.data;
                    renderReport(project);
                })
                .catch(error => {
                    console.error('加载项目数据失败:', error);
                    document.getElementById('projectTitle').textContent = '加载项目数据失败';
                });
        }

        // 渲染报表
        function renderReport(project) {
            document.getElementById('projectTitle').textContent = project.projectName;

            const reportContent = document.getElementById('reportContent');
            reportContent.innerHTML = '';

            // 添加所有项目字段到报表
            for (const [key, value] of Object.entries(project)) {
                if (key === 'uploadFiles' && value) {
                    // 特殊处理上传文件字段
                    const files = value.split(',').map(file => 
                        `<a href="${file}" target="_blank">${file.substring(file.lastIndexOf('/') + 1)}</a>`
                    ).join('<br>');
                    
                    addReportRow('上传文件', files || '无');
                } else if (key === 'id') {
                    continue; // 跳过ID字段
                } else {
                    addReportRow(
                        getFieldDisplayName(key),
                        value || '无'
                    );
                }
            }
        }

        // 添加报表行
        function addReportRow(field, value) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${field}</strong></td>
                <td>${value}</td>
            `;
            document.getElementById('reportContent').appendChild(row);
        }

        // 获取字段显示名称
        function getFieldDisplayName(key) {
            const names = {
                'projectName': '项目名称',
                'type' :'项目类型',
                'projectUrl': '项目地址',
                'projectLicense': '项目License',
                'modelUrl': '模型地址',
                'modelLicense': '模型License',
                'description': '描述',
                'projectDescription': '项目详细描述',
                'effectDescription': '效果描述',
                'projectLimitations': '项目限制',
                'deploymentStatus': '部署状态',
                'operationStatus': '运行状态',
                'uploadFiles'   : '上传文件',
                'createdTime': '创建时间',
                'updatedTime': '更新时间',
                'relatedProjects': '相关项目',
                'isDelete': '是否删除',
                'remarks': '备注',
                'createdBy': '创建人',
                'updatedBy': '更新人',
                'createdAt': '创建时间',
                'updatedAt': '更新时间'
            };
            return names[key] || key;
        }

        // 页面加载时获取项目数据
        document.addEventListener('DOMContentLoaded', loadProjectData);
    </script>
</body>
</html>
