<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开源项目管理</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .project-card {
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .project-description {
            height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .modal-body .form-group {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">开源项目管理</h1>
        
        <div class="row mb-3">
            <div class="col-md-6">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal">
                    <i class="bi bi-plus"></i> 添加项目
                </button>
                <button class="btn btn-info ms-2" onclick="window.open('/summary.html', '_blank')">
                    <i class="bi bi-bar-chart"></i> 项目汇总
                </button>
            </div>
            <div class="col-md-6 text-end d-flex align-items-center justify-content-end">
                <div class="input-group me-2" style="width: auto;">
                    <select class="form-select" id="typeFilter">
                        <option value="">所有类型</option>
                    </select>
                    <input type="text" class="form-control" placeholder="搜索项目..." id="searchInput">
                    <button class="btn btn-outline-secondary" type="button" id="searchBtn">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
                <nav aria-label="Page navigation" class="d-flex align-items-center">
                    <ul class="pagination pagination-sm mb-0 me-2" id="pagination">
                        <!-- 分页将通过JavaScript动态生成 -->
                    </ul>
                    <span id="totalCount" class="text-nowrap">共0条</span>
                </nav>
            </div>
        </div>

        <div class="row" id="projectsContainer">
            <!-- 项目列表将通过JavaScript动态加载 -->
        </div>

    </div>

    <!-- 项目详情模态框 -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">项目详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>项目名称:</strong> <span id="detailName"></span></p>
                            <p><strong>项目URL:</strong> <a id="detailUrl" target="_blank"></a></p>
                            <p><strong>项目许可证:</strong> <span id="detailLicense"></span></p>
                            <p><strong>模型URL:</strong> <span id="detailModelUrl"></span></p>
                            <p><strong>模型许可证:</strong> <span id="detailModelLicense"></span></p>
                            <p><strong>项目类型:</strong> <span id="detailType"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>简要描述:</strong> <span id="detailDescription"></span></p>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12">
                            <p><strong>项目详细描述:</strong></p>
                            <div id="detailProjectDescription" class="border p-2"></div>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12">
                            <p><strong>效果描述:</strong></p>
                            <div id="detailEffectDescription" class="border p-2"></div>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12">
                            <p><strong>上传文件:</strong></p>
                            <div id="detailUploadFiles" class="border p-2"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 项目编辑/添加模态框 -->
    <div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">添加项目</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="projectId">
                    <div class="form-group">
                        <label>项目名称</label>
                        <input type="text" class="form-control" id="projectName" required>
                    </div>
                    <div class="form-group">
                        <label>项目URL</label>
                        <input type="url" class="form-control" id="projectUrl" required>
                    </div>
                    <div class="form-group">
                        <label>项目许可证</label>
                        <input type="text" class="form-control" id="projectLicense" required>
                    </div>
                    <div class="form-group">
                        <label>模型URL</label>
                        <input type="url" class="form-control" id="modelUrl">
                    </div>
                    <div class="form-group">
                        <label>模型许可证</label>
                        <input type="text" class="form-control" id="modelLicense">
                    </div>
                    <div class="form-group">
                        <label>项目类型</label>
                        <input type="text" class="form-control" id="type">
                    </div>
                    <div class="form-group">
                        <label>简要描述</label>
                        <input type="text" class="form-control" id="description" required>
                    </div>
                    <div class="form-group">
                        <label>项目详细描述</label>
                        <textarea class="form-control" id="projectDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>效果描述</label>
                        <textarea class="form-control" id="effectDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea class="form-control" id="remarks" rows="6"></textarea>
                    </div>
                    <div class="form-group">
                        <label>上传文件</label>
                        <div class="input-group">
                            <input type="file" class="form-control" id="fileUpload">
                            <button class="btn btn-outline-secondary" type="button" onclick="uploadFile()">上传</button>
                        </div>
                        <input type="text" class="form-control mt-2" id="uploadedFiles">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveProject()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/axios.min.js"></script>
    <script>
        // 完整的JavaScript实现
        document.addEventListener('DOMContentLoaded', function() {
            // Clear form when clicking "Add Project" button
            document.querySelector('[data-bs-target="#projectModal"]').addEventListener('click', function() {
                document.getElementById('projectId').value = '';
                document.getElementById('projectModal').querySelector('form').reset();
                document.getElementById('uploadedFiles').value = '';
                document.getElementById('modalTitle').textContent = '添加项目';
                // Clear file input separately since reset() doesn't clear file inputs
                document.getElementById('fileUpload').value = '';
            });

            // Handle edit case separately
            document.getElementById('projectModal').addEventListener('show.bs.modal', function(event) {
                // Only set edit title if we're actually editing
                if (event.relatedTarget && event.relatedTarget.hasAttribute('data-id')) {
                    document.getElementById('modalTitle').textContent = '编辑项目';
                }
            });

            // Load project types first
            axios.get('/api/open-source-projects/types')
                .then(response => {
                    const typeFilter = document.getElementById('typeFilter');
                    response.data.forEach(type => {
                        const option = document.createElement('option');
                        option.value = type;
                        option.textContent = type;
                        typeFilter.appendChild(option);
                    });
                    
                    // Then load projects
                    loadProjects(1);
                })
                .catch(error => {
                    console.error('Error loading project types:', error);
                    loadProjects(1);
                });
            
            document.getElementById('searchBtn').addEventListener('click', function() {
                loadProjects(1);
            });

            // Reload projects when type filter changes
            document.getElementById('typeFilter').addEventListener('change', function() {
                loadProjects(1);
            });
        });

        let currentPage = 1;

        function loadProjects(page) {
            currentPage = page;
            const searchText = document.getElementById('searchInput').value;
            const typeFilter = document.getElementById('typeFilter').value;
            
            axios.get('/api/open-source-projects', {
                params: {
                    page: page,
                    search: searchText,
                    type: typeFilter,
                    size: 9
                }
            }).then(response => {
                renderProjects(response.data.content);
                renderPagination(response.data.totalPages, page, response.data.totalElements);
            }).catch(error => {
                console.error('Error loading projects:', error);
            });
        }

        function renderProjects(projects) {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = '';
            
            if (!projects || projects.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5"><h5>暂无项目数据</h5></div>';
                return;
            }
            
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'col-md-4 mb-4';
                card.innerHTML = `
                    <div class="card project-card h-100">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${project.projectName || '未命名项目'}</h5>
                            <p class="card-text project-description flex-grow-1">
                                ${project.description || '暂无描述'}
                            </p>
                            <p class="text-muted small">[${project.type || '未指定'}]许可证: ${project.projectLicense || '未指定'}</p>
                            
                            <div class="d-flex justify-content-between mt-auto">
                                <button class="btn btn-sm btn-outline-primary" onclick="viewProjectDetail('${project.id}')">
                                    查看详情
                                </button>
                                <a href="/report.html?id=${project.id}" class="btn btn-sm btn-outline-info" target="_blank">
                                    查看报表
                                </a>
                                <div>
                                    <button class="btn btn-sm btn-outline-secondary" onclick="editProject('${project.id}')">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteProject('${project.id}')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function viewProjectDetail(id) {
            axios.get(`/api/open-source-projects/${id}`)
                .then(response => {
                    const project = response.data;
                    document.getElementById('detailName').textContent = project.projectName;
                    document.getElementById('detailUrl').href = project.projectUrl;
                    document.getElementById('detailUrl').textContent = project.projectUrl;
                    document.getElementById('detailLicense').textContent = project.projectLicense;
                    document.getElementById('detailModelUrl').textContent = project.modelUrl;
                    document.getElementById('detailModelLicense').textContent = project.modelLicense;
                    document.getElementById('detailType').textContent = project.type || '未指定';
                    document.getElementById('detailDescription').textContent = project.description;
                    document.getElementById('detailProjectDescription').textContent = project.projectDescription;
                    document.getElementById('detailEffectDescription').textContent = project.effectDescription || '';
                    
                    // 显示上传文件
                    if (project.uploadFiles) {
                        const files = project.uploadFiles.split(',').map(file => 
                            `<a href="${file}" target="_blank">${file.substring(file.lastIndexOf('/') + 1)}</a>`
                        ).join('<br>');
                        document.getElementById('detailUploadFiles').innerHTML = files;
                    } else {
                        document.getElementById('detailUploadFiles').textContent = '无';
                    }

                    // 添加备注显示
                    const remarksEl = document.createElement('div');
                    remarksEl.className = 'row mt-3';
                    remarksEl.innerHTML = `
                        <div class="col-12">
                            <p><strong>备注:</strong></p>
                            <div class="border p-2">${project.remarks || '无'}</div>
                        </div>
                    `;
                    document.querySelector('#detailModal .modal-body').appendChild(remarksEl);
                    
                    const modal = new bootstrap.Modal(document.getElementById('detailModal'));
                    modal.show();
                })
                .catch(error => {
                    console.error('Error loading project details:', error);
                });
        }

        function renderPagination(totalPages, currentPage, totalElements) {
            const paginationContainer = document.getElementById('pagination').parentNode;
            
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="loadProjects(${i})">${i}</a>`;
                pagination.appendChild(li);
            }
            
            // Update total count display
            document.getElementById('totalCount').textContent = `共${totalElements}条`;
        }

        function editProject(id) {
            axios.get(`/api/open-source-projects/${id}`)
                .then(response => {
                    const project = response.data;
                    document.getElementById('projectId').value = project.id;
                    document.getElementById('projectName').value = project.projectName;
                    document.getElementById('projectUrl').value = project.projectUrl;
                    document.getElementById('projectLicense').value = project.projectLicense;
                    document.getElementById('modelUrl').value = project.modelUrl;
                    document.getElementById('modelLicense').value = project.modelLicense;
                    document.getElementById('type').value = project.type || '';
                    document.getElementById('description').value = project.description;
                    document.getElementById('projectDescription').value = project.projectDescription;
                    document.getElementById('effectDescription').value = project.effectDescription || '';
                    document.getElementById('remarks').value = project.remarks || '';
                    document.getElementById('uploadedFiles').value = project.uploadFiles || '';
                    
                    document.getElementById('modalTitle').textContent = '编辑项目';
                    const modal = new bootstrap.Modal(document.getElementById('projectModal'));
                    modal.show();
                })
                .catch(error => {
                    console.error('Error loading project:', error);
                });
        }

        function deleteProject(id) {
            if (confirm('确定要删除这个项目吗？')) {
                axios.delete(`/api/open-source-projects/${id}`)
                    .then(() => {
                        loadProjects(currentPage);
                    })
                    .catch(error => {
                        console.error('Error deleting project:', error);
                    });
            }
        }

        function uploadFile() {
            const fileInput = document.getElementById('fileUpload');
            if (fileInput.files.length === 0) {
                alert('请选择要上传的文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            axios.post('/api/open-source-projects/upload', formData, {
                headers: {
                    'Content-Type': 'multipart/form-data'
                }
            }).then(response => {
                const uploadedFiles = document.getElementById('uploadedFiles');
                if (uploadedFiles.value) {
                    uploadedFiles.value += ',' + response.data;
                } else {
                    uploadedFiles.value = response.data;
                }
                alert('文件上传成功');
            }).catch(error => {
                console.error('文件上传失败:', error);
                alert('文件上传失败: ' + error.response?.data || error.message);
            });
        }

        function saveProject() {
            const id = document.getElementById('projectId').value;
            const project = {
                projectName: document.getElementById('projectName').value,
                projectUrl: document.getElementById('projectUrl').value,
                projectLicense: document.getElementById('projectLicense').value,
                modelUrl: document.getElementById('modelUrl').value || '',
                modelLicense: document.getElementById('modelLicense').value || '',
                type: document.getElementById('type').value || '',
                description: document.getElementById('description').value,
                projectDescription: document.getElementById('projectDescription').value || '',
                effectDescription: document.getElementById('effectDescription').value || '',
                remarks: document.getElementById('remarks').value || '',
                uploadFiles: document.getElementById('uploadedFiles').value || ''
            };

            const request = id 
                ? axios.put(`/api/open-source-projects/${id}`, project, {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                : axios.post('/api/open-source-projects', project, {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

            request.then(() => {
                const modal = bootstrap.Modal.getInstance(document.getElementById('projectModal'));
                modal.hide();
                loadProjects(currentPage);
            })
            .catch(error => {
                console.error('Error saving project:', error);
                alert('保存失败: ' + error.response?.data?.message || error.message);
            });
        }
    </script>
</body>
</html>
