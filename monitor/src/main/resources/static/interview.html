<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Records</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        .record-card {
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .record-header {
            background-color: #f8f9fa;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
        }
        .record-body {
            padding: 15px;
        }
        .action-buttons {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Interview Records</h1>
        
        <div class="mb-4">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus"></i> Add New Record
            </button>
        </div>

        <div id="records-container"></div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="recordModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Interview Record</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="recordForm">
                        <input type="hidden" id="recordId">
                        <div class="mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" class="form-control" id="companyName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Company Introduction</label>
                            <textarea class="form-control" id="companyIntro" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Company Location</label>
                            <input type="text" class="form-control" id="companyLocation">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Position Title</label>
                            <input type="text" class="form-control" id="positionTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Position Requirements</label>
                            <textarea class="form-control" id="positionRequirements" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Resume Match</label>
                            <textarea class="form-control" id="resumeMatch" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Interview Details</label>
                            <textarea class="form-control" id="interviewDetail" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Feedback</label>
                            <textarea class="form-control" id="feedback" rows="3"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveRecord">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/axios.min.js"></script>
    <script>
        const API_BASE = '/api/interview-records';
        let records = [];

        // Load records on page load
        document.addEventListener('DOMContentLoaded', loadRecords);

        // Load all records
        async function loadRecords() {
            try {
                const response = await axios.get(API_BASE);
                records = response.data;
                renderRecords();
            } catch (error) {
                console.error('Error loading records:', error);
                alert('Failed to load records');
            }
        }

        // Render records to the page
        function renderRecords() {
            const container = document.getElementById('records-container');
            container.innerHTML = '';

            if (records.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No interview records found</div>';
                return;
            }

            records.forEach(record => {
                const card = document.createElement('div');
                card.className = 'card record-card';
                card.innerHTML = `
                    <div class="card-header record-header d-flex justify-content-between">
                        <h5>${record.companyName} - ${record.positionTitle}</h5>
                        <div>
                            <button class="btn btn-sm btn-outline-success open-btn" data-id="${record.id}">
                                <i class="bi bi-box-arrow-up-right"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-primary edit-btn" data-id="${record.id}">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${record.id}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body record-body">
                        <p><strong>Company Intro:</strong> ${record.companyIntro || 'N/A'}</p>
                        <p><strong>Location:</strong> ${record.companyLocation || 'N/A'}</p>
                        <p><strong>Requirements:</strong> ${record.positionRequirements || 'N/A'}</p>
                        <p><strong>Resume Match:</strong> ${record.resumeMatch || 'N/A'}</p>
                        <p><strong>Interview Details:</strong> ${record.interviewDetail || 'N/A'}</p>
                        <p><strong>Feedback:</strong> ${record.feedback || 'N/A'}</p>
                       
                        <p><strong>Notes:</strong> ${record.notes || 'N/A'}</p>
                        <div class="text-muted small">
                            Created: ${new Date(record.createdAt).toLocaleString()} | 
                            Updated: ${new Date(record.updatedAt).toLocaleString()}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            // Add event listeners to buttons
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => editRecord(btn.dataset.id));
            });

            document.querySelectorAll('.open-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    window.open(`/interview_resume.html?id=${btn.dataset.id}`, '_blank');
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteRecord(btn.dataset.id));
            });
        }

        // Show modal for adding new record
        document.querySelector('[data-bs-target="#addModal"]').addEventListener('click', () => {
            document.getElementById('modalTitle').textContent = 'Add Interview Record';
            document.getElementById('recordForm').reset();
            document.getElementById('recordId').value = '';
            const modal = new bootstrap.Modal(document.getElementById('recordModal'));
            modal.show();
        });

        // Edit existing record
        function editRecord(id) {
            const record = records.find(r => r.id == id);
            if (!record) return;

            document.getElementById('modalTitle').textContent = 'Edit Interview Record';
            document.getElementById('recordId').value = record.id;
            document.getElementById('companyName').value = record.companyName;
            document.getElementById('companyLocation').value = record.companyLocation || '';
            document.getElementById('positionTitle').value = record.positionTitle;
            document.getElementById('positionRequirements').value = record.positionRequirements || '';
            document.getElementById('resumeMatch').value = record.resumeMatch || '';
            document.getElementById('interviewDetail').value = record.interviewDetail || '';
            document.getElementById('feedback').value = record.feedback || '';
                document.getElementById('companyIntro').value = record.companyIntro || '';
                document.getElementById('notes').value = record.notes || '';

            const modal = new bootstrap.Modal(document.getElementById('recordModal'));
            modal.show();
        }

        // Save record (create or update)
        document.getElementById('saveRecord').addEventListener('click', async () => {
            const record = {
                companyName: document.getElementById('companyName').value,
                companyLocation: document.getElementById('companyLocation').value,
                positionTitle: document.getElementById('positionTitle').value,
                positionRequirements: document.getElementById('positionRequirements').value,
                resumeMatch: document.getElementById('resumeMatch').value,
                interviewDetail: document.getElementById('interviewDetail').value,
                feedback: document.getElementById('feedback').value,
                companyIntro: document.getElementById('companyIntro').value,
                notes: document.getElementById('notes').value
            };

            const id = document.getElementById('recordId').value;

            try {
                if (id) {
                    // Update existing record
                    await axios.put(`${API_BASE}/${id}`, record);
                } else {
                    // Create new record
                    await axios.post(API_BASE, record);
                }
                loadRecords();
                bootstrap.Modal.getInstance(document.getElementById('recordModal')).hide();
            } catch (error) {
                console.error('Error saving record:', error);
                alert('Failed to save record');
            }
        });

        // Delete record
        async function deleteRecord(id) {
            if (!confirm('Are you sure you want to delete this record?')) return;

            try {
                await axios.delete(`${API_BASE}/${id}`);
                loadRecords();
            } catch (error) {
                console.error('Error deleting record:', error);
                alert('Failed to delete record');
            }
        }
    </script>
</body>
</html>
