<!DOCTYPE html>
<html>
<head>
    <title>Tools Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .search-box button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .pagination button {
            padding: 5px 10px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }
        .pagination button.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 50%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 5px;
            position: relative;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .form-actions {
            text-align: right;
            margin-top: 20px;
            position: sticky;
            bottom: 0;
            background: white;
            padding: 10px 0;
        }
        .form-actions button {
            padding: 8px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-save {
            background-color: #4CAF50;
            color: white;
        }
        .btn-cancel {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tools Management</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search tools...">
            <button onclick="searchTools()">Search</button>
            <button onclick="showAddModal()">Add New Tool</button>
        </div>

        <table id="toolsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Java Class</th>
                    <th>Java Method</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="toolsBody"></tbody>
        </table>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="toolModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Tool</h2>
            <form id="toolForm">
                <input type="hidden" id="toolId">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="javaClass">Java Class</label>
                    <input type="text" id="javaClass">
                </div>
                <div class="form-group">
                    <label for="javaMethod">Java Method</label>
                    <input type="text" id="javaMethod">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="6"></textarea>
                </div>
                <div class="form-group">
                    <label for="parametersJson">Parameters (JSON)</label>
                    <textarea id="parametersJson" rows="10"></textarea>
                </div>
                <div class="form-group">
                    <label for="requiredParameters">Required Parameters</label>
                    <input type="text" id="requiredParameters">
                </div>
                <div class="form-group">
                    <label for="comments">Comments</label>
                    <textarea id="comments" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="button" class="btn-save" onclick="saveTool()">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 10;
        let totalItems = 0;

        // Load tools when page loads
        window.onload = function() {
            loadTools();
        };

        // Load tools with pagination
        function loadTools(page = 1, keyword = '') {
            currentPage = page;
            const searchInput = document.getElementById('searchInput');
            if (!keyword && searchInput.value) {
                keyword = searchInput.value;
            }

            fetch(`/api/tool?page=${page}&pageSize=${pageSize}&keyword=${encodeURIComponent(keyword)}`)
                .then(response => response.json())
                .then(data => {
                    totalItems = data.total;
                    renderTools(data.data);
                    renderPagination();
                });
        }

        // Search tools
        function searchTools() {
            loadTools(1);
        }

        // Render tools table
        function renderTools(tools) {
            const tbody = document.getElementById('toolsBody');
            tbody.innerHTML = '';

            tools.forEach(tool => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${tool.id}</td>
                    <td>${tool.name || ''}</td>
                    <td>${tool.javaClass || ''}</td>
                    <td>${tool.javaMethod || ''}</td>
                    <td>${tool.description ? tool.description.substring(0, 50) + (tool.description.length > 50 ? '...' : '') : ''}</td>
                    <td>
                        <button onclick="showEditModal(${tool.id})">Edit</button>
                        <button onclick="deleteTool(${tool.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Render pagination
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            const totalPages = Math.ceil(totalItems / pageSize);
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            // Previous button
            if (currentPage > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.textContent = 'Previous';
                prevBtn.onclick = () => loadTools(currentPage - 1);
                pagination.appendChild(prevBtn);
            }

            // Page numbers
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                if (i === currentPage) {
                    pageBtn.classList.add('active');
                }
                pageBtn.onclick = () => loadTools(i);
                pagination.appendChild(pageBtn);
            }

            // Next button
            if (currentPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.textContent = 'Next';
                nextBtn.onclick = () => loadTools(currentPage + 1);
                pagination.appendChild(nextBtn);
            }
        }

        // Show add modal
        function showAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Tool';
            document.getElementById('toolId').value = '';
            document.getElementById('toolForm').reset();
            document.getElementById('toolModal').style.display = 'block';
        }

        // Show edit modal
        function showEditModal(id) {
            fetch(`/api/tool/${id}`)
                .then(response => response.json())
                .then(tool => {
                    document.getElementById('modalTitle').textContent = 'Edit Tool';
                    document.getElementById('toolId').value = tool.id;
                    document.getElementById('name').value = tool.name || '';
                    document.getElementById('javaClass').value = tool.javaClass || '';
                    document.getElementById('javaMethod').value = tool.javaMethod || '';
                    document.getElementById('description').value = tool.description || '';
                    document.getElementById('parametersJson').value = tool.parametersJson || '';
                    document.getElementById('requiredParameters').value = tool.requiredParameters || '';
                    document.getElementById('comments').value = tool.comments || '';
                    document.getElementById('toolModal').style.display = 'block';
                });
        }

        // Close modal
        function closeModal() {
            document.getElementById('toolModal').style.display = 'none';
        }

        // Save tool
        function saveTool() {
            const toolId = document.getElementById('toolId').value;
            const tool = {
                name: document.getElementById('name').value,
                javaClass: document.getElementById('javaClass').value,
                javaMethod: document.getElementById('javaMethod').value,
                description: document.getElementById('description').value,
                parametersJson: document.getElementById('parametersJson').value,
                requiredParameters: document.getElementById('requiredParameters').value,
                comments: document.getElementById('comments').value
            };

            const url = toolId ? `/api/tool/${toolId}` : '/api/tool';
            const method = toolId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(tool)
            })
            .then(response => {
                if (response.ok) {
                    closeModal();
                    loadTools(currentPage);
                }
            });
        }

        // Delete tool
        function deleteTool(id) {
            if (confirm('Are you sure you want to delete this tool?')) {
                fetch(`/api/tool/${id}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (response.ok) {
                        loadTools(currentPage);
                    }
                });
            }
        }
    </script>
</body>
</html>
