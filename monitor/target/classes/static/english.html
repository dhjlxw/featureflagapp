<!DOCTYPE html>
<html  lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dictionary Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .search-container {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
            align-items: center;
        }
        .search-box {
            flex-grow: 1;
            padding: 8px;
            font-size: 16px;
        }
        .status-filter {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .pagination {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-left: 10px;
        }
        .items-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }
        .item-card {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            background-color: #f9f9f9;
            cursor: pointer;
            transition: all 0.3s;
        }
        .item-card.highlighted {
            background-color: #d4edda;
            border-color: #c3e6cb;
            box-shadow: 0 0 0 2px rgba(40, 167, 69, 0.25);
        }
        .action-bar {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding: 20px 0;
        }
        .item-card h4 {
            margin: 0 0 5px 0;
            color: #333;
        }
        .item-card p {
            margin: 5px 0;
            color: #666;
        }
        .status-active {
            color: green;
            font-weight: bold;
        }
        .status-inactive {
            color: red;
            font-weight: bold;
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Dictionary Search</h1>
    <div class="search-container">
        <div class="status-filter">
            <label>状态:</label>
            <label><input type="radio" name="status" value="Y" checked>Active</label>
            <label><input type="radio" name="status" value="N">Inactive</label>
            <label><input type="radio" name="status" value="E">New</label>
            <label><input type="radio" name="status" value=""> 全部</label>
        </div>
        <input type="text" id="keyword" class="search-box" placeholder="请输入关键词">
        <button onclick="search(1)">搜索</button>
        <div class="pagination" id="pagination-info"></div>
    </div>
    <div class="items-container" id="items-container"></div>
    
    <div class="action-bar">
        <button id="mark-btn" onclick="markItems()" title="标记选中项为Active，并同时标记未选中项为Inactive">标记选中项</button>
        &nbsp;<button id="mark-active-btn" onclick="markActiveOnly()">标记Active</button>
        &nbsp;<button id="mark-inactive-btn" onclick="markInactiveOnly()">标记Inactive</button>
    </div>

    <script>
        let highlightedItems = new Set();

        function toggleHighlight(item, id) {
            item.classList.toggle('highlighted');
            if (item.classList.contains('highlighted')) {
                highlightedItems.add(id);
            } else {
                highlightedItems.delete(id);
            }
        }

        function markActiveOnly() {
            const activeIds = Array.from(highlightedItems);
            if (activeIds.length === 0) {
                alert('请先选择要标记为Active的条目');
                return;
            }

            if (!confirm(`确定要将选中的${activeIds.length}个条目标记为Active吗？`)) {
                return;
            }

            fetch('/api/dictionary/batch-update-status', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    active: activeIds,
                    deactive: [] // 确保不修改未选中条目
                })
            })
            .then(response => response.json())
            .then(data => {
                alert(`成功将${data.activated}项设为Active`);
                search(currentPage);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('更新失败');
            });
        }

        function markInactiveOnly() {
            const inactiveIds = Array.from(highlightedItems);
            if (inactiveIds.length === 0) {
                alert('请先选择要标记的条目');
                return;
            }

            if (!confirm(`确定要将${inactiveIds.length}个条目标记为Inactive吗？`)) {
                return;
            }

            fetch('/api/dictionary/batch-update-status', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    active: [],
                    deactive: inactiveIds
                })
            })
            .then(response => response.json())
            .then(data => {
                alert(`成功将${data.deactivated}项设为Inactive`);
                search(currentPage);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('更新失败');
            });
        }

        function markItems() {
            const activeIds = Array.from(highlightedItems);
            if (activeIds.length === 0) {
                alert('请先选择要标记的条目');
                return;
            }

            if (!confirm(`确定要将${activeIds.length}个选中的条目标记为Active，其余标记为Inactive吗？`)) {
                return;
            }

            const allItems = Array.from(document.querySelectorAll('.item-card'));
            const deactiveIds = allItems
                .filter(item => !item.classList.contains('highlighted'))
                .map(item => parseInt(item.dataset.id));

            fetch('/api/dictionary/batch-update-status', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    active: activeIds,
                    deactive: deactiveIds
                })
            })
            .then(response => response.json())
            .then(data => {
                alert(`成功更新: ${data.activated}项设为Y, ${data.deactivated}项设为N`);
                search(currentPage); // 刷新当前页
            })
            .catch(error => {
                console.error('Error:', error);
                alert('更新失败');
            });
        }
        let currentPage = 1;
        let totalPages = 1;

        function search(page) {
            highlightedItems = new Set();
            currentPage = page;
            const status = document.querySelector('input[name="status"]:checked').value;
            const keyword = document.getElementById('keyword').value;
            
            fetch(`/api/dictionary/search?status=${status}&keyword=${keyword}&page=${page}&size=25`)
                .then(response => response.json())
                .then(data => {
                    totalPages = data.totalPages;
                    renderItems(data.data);
                    renderPagination();
                })
                .catch(error => console.error('Error:', error));
        }

        function renderItems(items) {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            
            items.forEach(item => {
                const itemCard = document.createElement('div');
                itemCard.className = 'item-card';
                itemCard.dataset.id = item.id;
                itemCard.onclick = () => toggleHighlight(itemCard, item.id);
                itemCard.innerHTML = `
                    <h4>${item.english || ''}</h4>
                    <p>${item.chinese || ''}</p>
                    <p class="status-${item.status === 'Y' ? 'active' : 'inactive'}">
                        ${item.status === 'Y' ? 'Active' :item.status==='E'?'New': 'Inactive'}
                    </p>
                `;
                container.appendChild(itemCard);
            });
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination-info');
            pagination.innerHTML = `
                 ${currentPage} of ${totalPages} | 
                <button onclick="search(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                <button onclick="search(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上页</button>
                <button onclick="search(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下页</button>
                <button onclick="search(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>尾页</button>
            `;
        }

        // Initial load
        search(1);
    </script>
</body>
</html>
